# Preset labels — press digit code to change the label
# Supports single-digit (1), two-digit (12), or three-digit (123) codes
# If a code is a prefix of another (e.g. 1 and 12 both exist),
# the shorter one waits ~600ms before applying; the longer one applies immediately.
labels:
  1: person
  2: car
  3: motor
  4: truck
  5: cat
  6: dog
  7: bus
  8: bicycle
  9: train
  0: unknown
  # 多碼範例 (uncomment to use):
  11: motorcycle
  12: scooter
  21: pickup
  22: van
  31: airplane
  99: other
  111: fire_hydrant
  1111: stop_sign

# default label name, draw bbox with this label
default_label: object

# minimal height or width of bbox
minimal_bbox_length: 30

# Auto save interval in seconds. -1 means disabled.
# N秒自動儲存, 以免重複性太高. 但有些問題, 就是要存的有時候會被跳過, 目前不建議使用
auto_save_per_second: 5

# show fps to console when detecting using model
show_fps: false

# save img and labels to this folder (relative path of original img)
# save_folder: ./output  # 相對路徑
save_folder: C:/output  # 絕對路徑, 統一都將VOC標籤與圖片都輸出到此

# 是否啟用 Draw / Erase / Fill 遮罩工具
enable_mask_tools: false

# 是否啟用旋轉 (OBB) 功能
enable_obb: false

# 是否啟用 SAM3 模型
enable_sam3: true
