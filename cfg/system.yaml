# Preset labels — press digit code to change the label
# Supports single-digit (1), two-digit (12), or three-digit (123) codes
# If a code is a prefix of another (e.g. 1 and 12 both exist),
# the shorter one waits for label_key_timeout before applying; the longer one applies immediately.
#
# 分類樹狀結構：
#   1x 四足動物    2x 人類/兩足    3x 鳥類/飛行動物
#   4x 小型車輛    5x 兩輪車       6x 大型車輛
#   7x 軌道/航空/船  8x 街道設施   9x 機械設備/其他
labels:
  # --- 1x 四足動物 ---
  1: dog
  11: cat
  12: horse
  13: cow
  14: sheep
  15: deer
  16: bear
  17: pig
  # --- 2x 人類/兩足 ---
  2: person
  21: child
  22: cyclist
  23: rider
  # --- 3x 鳥類/飛行動物 ---
  3: bird
  31: duck
  32: eagle
  33: pigeon
  # --- 4x 小型車輛 ---
  4: car
  41: sedan
  42: suv
  43: pickup
  44: van
  45: taxi
  # --- 5x 兩輪車 ---
  5: motorcycle
  51: scooter
  52: bicycle
  53: ebike
  # --- 6x 大型車輛 ---
  6: truck
  61: bus
  62: trailer
  63: ambulance
  64: fire_truck
  # --- 7x 軌道/航空/船 ---
  7: train
  71: airplane
  72: helicopter
  73: boat
  74: ship
  # --- 8x 街道設施 ---
  8: traffic_light
  81: stop_sign
  82: fire_hydrant
  83: bench
  84: trash_can
  85: cone
  # --- 9x 機械設備/其他 ---
  9: forklift
  91: excavator
  92: crane
  93: robot
  99: others
  # --- 0 未分類 ---
  0: unknown

# default label name, draw bbox with this label
default_label: object

# 多碼 label 輸入的等待時間（秒），超過此時間自動套用已輸入的碼
# 習慣的話就可以設低一點, 短編碼反應速度才會快
label_key_timeout: 2

# minimal height or width of bbox
minimal_bbox_length: 30

# Auto save interval in seconds. -1 means disabled.
# N秒自動儲存, 以免重複性太高. 但有些問題, 就是要存的有時候會被跳過, 目前不建議使用
auto_save_per_second: 5

# show fps to console when detecting using model
show_fps: false

# save img and labels to this folder (relative path of original img)
# save_folder: ./output  # 相對路徑
save_folder: C:/output  # 絕對路徑, 統一都將VOC標籤與圖片都輸出到此

# 是否啟用 Draw / Erase / Fill 遮罩工具
enable_mask_tools: false

# 是否啟用旋轉 (OBB) 功能
enable_obb: false

# 是否啟用 SAM3 模型
enable_sam3: true
