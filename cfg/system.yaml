# 預設標籤 — 按數字碼切換標籤
# 支援單碼 (1)、雙碼 (12)、三碼 (123)
# 若某碼是另一碼的前綴（例如 1 和 12 同時存在），
# 短碼會等待 label_key_timeout 後才套用；長碼則立即套用。
#
# 分類樹狀結構（以自動相機野生動物為主）：
#   1x 哺乳類(大型)  2x 哺乳類(中型)  3x 哺乳類(小型)
#   4x 鳥類          5x 爬蟲/兩棲      6x 人類
#   9x 車輛/設施/其他
labels:
  # --- 1x 哺乳類(大型) ---
  1: deer
  11: bear
  12: boar
  13: serow
  14: sambar
  15: cow
  # --- 2x 哺乳類(中型) ---
  2: monkey
  21: dog
  22: cat
  23: fox
  24: badger
  25: civet
  26: pangolin
  # --- 3x 哺乳類(小型) ---
  3: squirrel
  31: rabbit
  32: rat
  33: ferret_badger
  34: mouse
  # --- 4x 鳥類 ---
  4: bird
  41: pheasant
  42: eagle
  43: owl
  44: pigeon
  # --- 5x 爬蟲/兩棲 ---
  5: snake
  51: lizard
  52: frog
  53: turtle
  # --- 6x 人類 ---
  6: person
  # --- 9x 車輛/設施/其他 ---
  9: vehicle
  91: others
  # --- 0 未分類 ---
  0: unknown

# 預設標籤名稱，繪製 bbox 時使用此標籤
default_label: object

# 多碼 label 輸入的等待時間（秒），超過此時間自動套用已輸入的碼
# 習慣的話就可以設低一點, 短編碼反應速度才會快
label_key_timeout: 2

# bbox 最小高度或寬度, polygon則以長方形的最小邊的長度
minimal_bbox_length: 30

# 自動儲存間隔（秒），-1 表示停用
# N秒自動儲存, 以免重複性太高. 但有些問題, 就是要存的有時候會被跳過, 目前不建議使用
auto_save_per_second: 5

# 是否在偵測時於 console 顯示 FPS
show_fps: false

# 儲存圖片與標籤的資料夾（可用相對或絕對路徑）
# save_folder: ./output  # 相對路徑
save_folder: C:/output  # 絕對路徑, 統一都將VOC標籤與圖片都輸出到此

# 是否啟用 Draw / Erase / Fill 遮罩工具
enable_mask_tools: false

# 是否啟用旋轉 (OBB) 功能
enable_obb: false

# 是否啟用 SAM3 模型
enable_sam3: true
